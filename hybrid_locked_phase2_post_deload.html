<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hybrid Locked Phase 2 (Post-Deload)</title>
  <style>
    :root{
      --primary:#8b5cf6;
      --cardio:#f43f5e;
      --rest:#10b981;
      --bg:#0f172a;
      --card:#1e293b;
      --text:#f1f5f9;
      --muted:#9aa4b2;
      --input-bg:#334155;
      --border:#2b3647;
    }

    * { box-sizing:border-box; }

    body{
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);
      color:var(--text);
      margin:0;
      padding-bottom:170px;
    }

    header{
      background:var(--card);
      padding:15px;
      position:sticky;
      top:0;
      z-index:100;
      border-bottom:1px solid #333;
    }

    .top-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-size:1.05rem;
      color:var(--primary);
      font-weight:900;
      letter-spacing:.4px;
    }

    .subtitle{
      color:#cbd5e1;
      font-size:0.9rem;
      margin:8px 0 0 0;
    }

    .phase-banner{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      background:rgba(139,92,246,0.14);
      border:1px solid rgba(139,92,246,0.35);
      color:#e9ddff;
      font-size:0.86rem;
      line-height:1.35;
    }

    select{
      background:var(--input-bg);
      color:white;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid #555;
    }

    .right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn-pill{
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:white;
      border:none;
      padding:7px 12px;
      border-radius:999px;
      font-weight:900;
      cursor:pointer;
      font-size:0.82rem;
    }

    .btn-pill.secondary{
      background:#2b3647;
      border:1px solid #43526a;
      color:#d1d5db;
    }

    #userBadge{
      font-size:0.78rem;
      color:var(--muted);
      text-align:right;
    }

    .cycle-nav{
      display:flex;
      overflow-x:auto;
      gap:6px;
      padding-bottom:5px;
    }

    .day-btn{
      background:var(--input-bg);
      color:var(--muted);
      border:none;
      padding:10px 14px;
      border-radius:12px;
      white-space:nowrap;
      cursor:pointer;
    }

    .day-btn.active{
      background:var(--primary);
      color:white;
      font-weight:900;
    }

    .day-btn.cardio{
      background:rgba(244,63,94,0.25);
      color:#fecdd3;
      border:1px solid rgba(244,63,94,0.45);
    }

    .day-btn.rest{
      background:rgba(16,185,129,0.20);
      color:#a7f3d0;
      border:1px solid rgba(16,185,129,0.45);
    }

    .container{
      padding:15px;
      max-width:760px;
      margin:0 auto;
    }

    .banner{
      border-radius:12px;
      padding:10px;
      margin-bottom:15px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.04);
      font-size:0.92rem;
      color:#dbeafe;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .banner.rest{
      color:#a7f3d0;
      border-color:rgba(16,185,129,0.45);
      background:rgba(16,185,129,0.10);
    }

    .banner.cardio{
      color:#fecdd3;
      border-color:rgba(244,63,94,0.45);
      background:rgba(244,63,94,0.10);
    }

    .exercise-card{
      background:var(--card);
      border-radius:14px;
      padding:15px;
      margin-bottom:15px;
      border:1px solid #333;
    }

    .ex-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
    }

    .ex-name{
      font-weight:900;
      font-size:1rem;
      display:block;
    }

    .ex-meta{
      font-size:0.78rem;
      color:#94a3b8;
      margin-top:3px;
      display:block;
      line-height:1.25;
    }

    .ex-rest{
      background:#334155;
      color:#e2e8f0;
      padding:3px 8px;
      border-radius:10px;
      font-size:0.74rem;
      white-space:nowrap;
    }

    .set-grid{
      display:grid;
      grid-template-columns:26px 1fr 1fr 1fr 28px 28px;
      gap:6px;
      margin-bottom:6px;
      align-items:center;
    }

    .set-grid span{
      font-size:0.72rem;
      color:var(--muted);
      text-align:center;
    }

    input[type="number"]{
      background:var(--input-bg);
      border:1px solid #444;
      color:white;
      padding:8px 2px;
      width:100%;
      text-align:center;
      border-radius:10px;
      font-size:0.92rem;
    }

    .inp-check{
      height:18px;
      width:18px;
      cursor:pointer;
    }

    .inp-done{ accent-color:var(--rest); }
    .inp-ds{ accent-color:var(--cardio); }

    .history{
      font-size:0.78rem;
      color:#94a3b8;
      grid-column:2 / span 5;
      text-align:center;
      font-style:italic;
      margin-bottom:2px;
      opacity:0.75;
    }

    .btn-add{
      width:100%;
      background:transparent;
      border:1px dashed #566276;
      color:#a8b1bf;
      padding:10px;
      margin-top:6px;
      cursor:pointer;
      border-radius:12px;
    }

    .ex-note{
      width:100%;
      background:rgba(0,0,0,0.18);
      border:1px solid #3d495b;
      color:#e2e8f0;
      padding:10px;
      border-radius:12px;
      font-family:inherit;
      font-size:0.9rem;
      margin-top:10px;
      resize:vertical;
    }

    .info-card{
      background:rgba(255,255,255,0.05);
      padding:18px;
      border-radius:14px;
      text-align:center;
      border:1px solid #444;
    }

    .fab{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      width:92%;
      max-width:460px;
      display:flex;
      flex-direction:column;
      gap:8px;
      z-index:200;
    }

    .btn-save{
      width:100%;
      background:var(--rest);
      color:white;
      border:none;
      padding:15px;
      border-radius:30px;
      font-weight:1000;
      font-size:1rem;
      cursor:pointer;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }

    .save-status{
      text-align:center;
      color:var(--muted);
      font-size:0.78rem;
    }
  </style>
</head>
<body>
<header>
  <div class="top-row">
    <div>
      <h1>HYBRID LOCKED PHASE 2</h1>
      <div class="subtitle">Post-deload hypertrophy * fitness support * definition support</div>
    </div>
    <div class="right">
      <button id="signOutBtn" class="btn-pill secondary" style="display:none;">Sign out</button>
      <button id="signInBtn" class="btn-pill" style="display:none;">Sign in</button>
    </div>
  </div>

  <div class="phase-banner">
    Phase 2 keeps the original hypertrophy engine, adds Zone 2 on recovery days, trims unneeded arm fatigue, and adds small conditioning finishers.
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; margin:12px 0 10px 0;">
    <select id="cycleSelect" onchange="render()">
      <option value="1">Cycle 1</option>
      <option value="2">Cycle 2</option>
      <option value="3">Cycle 3</option>
      <option value="4">Cycle 4</option>
      <option value="5">Cycle 5</option>
      <option value="6">Cycle 6</option>
      <option value="7">Cycle 7</option>
    </select>
    <div id="userBadge"></div>
  </div>

  <div class="cycle-nav" id="nav"></div>
</header>

<div class="container" id="app"></div>

<div class="fab">
  <button class="btn-save" onclick="save(false)">SAVE PROGRESS</button>
  <div class="save-status" id="saveStatus">Local save only</div>
</div>

<script type="module">
  const exercises = {
    "1": {
      title: "Day 1: Posterior Chain + Back Add-on (Hams + Glutes)",
      type: "lift",
      banner: "Lengthened tension focus. Push hard, recover harder.",
      list: [
        { id:"rdl", name:"Romanian Deadlift", sets:3, reps:"6-10", rest:"2-3m", note:"RIR 1-2. 3-4s eccentric." },
        { id:"seated_curl", name:"Seated Leg Curl", sets:4, reps:"8-12", rest:"90-120s", note:"Last set near failure." },
        { id:"hip_thrust", name:"Hip Thrust / Glute Bridge", sets:3, reps:"8-12", rest:"2m" }
      ]
    },
    "2": { title: "Day 2: PUSH (Chest-Dominant)", type: "lift", banner: "Primer -> heavy incline -> hypertrophy work.", list: [] },
    "3": { title: "Day 3: OFF (Recovery + Zone 2)", type: "rest", desc: "Recovery-focused day", protocol: "Walk 30-45 min Zone 2" },
    "4": { title: "Day 4: BACK + BICEPS (Lat Focus)", type: "lift", banner: "Big back volume without lower-back fatigue.", list: [] },
    "5": { title: "Day 5: QUADS (Deep + Pump)", type: "lift", banner: "Depth + tension + pump.", list: [] },
    "6": { title: "Day 6: ARMS", type: "lift", banner: "Direct arm volume.", list: [] },
    "7": { title: "Day 7: OFF (Rest + Zone 2)", type: "rest", desc: "Rest", protocol: "Easy walk or bike 30-45 min" },
    "8": { title: "Day 8: Heavy / Neural", type: "lift", banner: "Heavy exposure without grinding.", list: [] },
    "9": { title: "Day 9: VO2max Conditioning", type: "cardio", desc: "High-intensity conditioning", protocol: "4x4 intervals" }
  };

  const KEY = "hybrid_locked_phase2_post_deload_v1";
  let state = { cycle: "1", day: "1", data: {} };

  function renderNav() {
    const nav = document.getElementById("nav");
    nav.innerHTML = "";
    for (let i = 1; i <= 9; i++) {
      const b = document.createElement("button");
      b.innerText = `Day ${i}`;
      const dayType = exercises[String(i)].type;
      b.className = "day-btn" + (dayType === "rest" ? " rest" : (dayType === "cardio" ? " cardio" : ""));
      b.onclick = () => { state.day = String(i); render(); };
      nav.appendChild(b);
    }
  }

  function getID(exID) { return `c${state.cycle}_d${state.day}_${exID}`; }

  function render() {
    const app = document.getElementById("app");
    app.innerHTML = "";

    state.cycle = document.getElementById("cycleSelect").value;

    document.querySelectorAll(".day-btn").forEach((b) => {
      b.classList.remove("active");
      if (b.innerText === `Day ${state.day}`) b.classList.add("active");
    });

    const dayData = exercises[state.day];
    const h2 = document.createElement("h2");
    h2.innerText = dayData.title;
    h2.style.color = dayData.type === "lift" ? "var(--primary)" : (dayData.type === "rest" ? "var(--rest)" : "var(--cardio)");
    app.appendChild(h2);

    if (dayData.type === "rest") {
      app.innerHTML += `<div class="banner rest"><div><strong>${dayData.desc}</strong> - ${dayData.protocol}</div></div>`;
      return;
    }

    if (dayData.type === "cardio") {
      app.innerHTML += `<div class="banner cardio"><div><strong>${dayData.desc}</strong> - ${dayData.protocol}</div></div>`;
      return;
    }

    if (dayData.banner) {
      app.innerHTML += `<div class="banner"><div>${dayData.banner}</div></div>`;
    }

    if (!dayData.list.length) {
      app.innerHTML += `<div class="info-card"><p>This day is loaded. Add the full exercise list after the page is working again.</p></div>`;
      return;
    }

    dayData.list.forEach((ex) => {
      const current = state.data[getID(ex.id)] || {};
      const currentNote = current.note || "";
      const currentSets = current.sets || [];
      const count = currentSets.length || ex.sets;

      let setsHtml = `<div class="set-grid"><span>#</span><span>LBS</span><span>REPS</span><span>RPE</span><span>DS</span><span></span></div>`;

      for (let i = 0; i < count; i++) {
        const s = currentSets[i] || {};
        setsHtml += `
          <div class="set-grid row" data-id="${ex.id}">
            <span>${i + 1}</span>
            <input type="number" class="w" value="${s.w || ""}" placeholder="-" oninput="save(true)">
            <input type="number" class="r" value="${s.r || ""}" placeholder="-" oninput="save(true)">
            <input type="number" class="rpe" value="${s.rpe || ""}" placeholder="-" oninput="save(true)">
            <input type="checkbox" class="inp-check inp-ds" ${s.ds ? "checked" : ""} onchange="save(true)">
            <input type="checkbox" class="inp-check inp-done" ${s.done ? "checked" : ""} onchange="save(true)">
          </div>
        `;
      }

      const div = document.createElement("div");
      div.className = "exercise-card";
      div.innerHTML = `
        <div class="ex-header">
          <div>
            <span class="ex-name">${ex.name}</span>
            <span class="ex-meta">${ex.reps} * ${ex.sets} sets</span>
          </div>
          <div class="ex-rest">${ex.rest || "2m"}</div>
        </div>
        <div id="sets-${ex.id}">${setsHtml}</div>
        <textarea id="note-${ex.id}" class="ex-note" placeholder="Notes..." oninput="save(true)">${currentNote}</textarea>
      `;
      app.appendChild(div);
    });
  }

  function save(isAuto = false) {
    const dayData = exercises[state.day];
    if (dayData.type === "lift") {
      dayData.list.forEach((ex) => {
        const rows = document.querySelectorAll(`.row[data-id="${ex.id}"]`);
        const sets = [];
        rows.forEach((r) => {
          sets.push({
            w: r.querySelector(".w")?.value || "",
            r: r.querySelector(".r")?.value || "",
            rpe: r.querySelector(".rpe")?.value || "",
            ds: !!r.querySelector(".inp-ds")?.checked,
            done: !!r.querySelector(".inp-done")?.checked
          });
        });
        state.data[getID(ex.id)] = {
          sets,
          note: document.getElementById(`note-${ex.id}`)?.value || ""
        };
      });
    }

    state.data.lastActiveDay = state.day;
    localStorage.setItem(KEY, JSON.stringify(state.data));

    const status = document.getElementById("saveStatus");
    const now = new Date();
    const time = now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0");
    status.textContent = `${isAuto ? "Auto-saved" : "Saved"} locally at ${time}`;
  }

  window.render = render;
  window.save = save;

  const stored = localStorage.getItem(KEY);
  if (stored) {
    try { state.data = JSON.parse(stored); } catch {}
  }

  renderNav();
  render();
  setInterval(() => save(true), 10000);
</script>
</body>
</html>
